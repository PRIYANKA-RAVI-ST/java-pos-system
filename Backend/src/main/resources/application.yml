spring:
  application:
    name: pos-system

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:your-email}
    password: ${MAIL_PASSWORD:your-gmail-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: ${PORT:5000}

razorpay:
  api:
    key: ${RAZORPAY_KEY:your-razorpay-key}
    secret: ${RAZORPAY_SECRET:your-razorpay-secret}

stripe:
  api:
    key: ${STRIPE_KEY:your-stripe-key}

app:
  frontend:
    reset-url: ${FRONTEND_RESET_URL:http://localhost:5173/auth/reset-password?token=}

logging:
  level:
    org:
      hibernate:
        SQL: DEBUG
